<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | Afnan's Detailing Supplies</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
      <a class="navbar-brand" href="storefront.html">Afnan's Detailing Supplies</a>

      <div class="navbar-nav">
        <a class="nav-link" href="storefront.html">Home</a>
        <a class="nav-link" href="#">About Us</a>
        <a class="nav-link" href="#">Images</a>
        <a class="nav-link active" href="signup.html">Signup</a>
        <a class="nav-link" href="#">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h3 mb-3">User Signup</h1>

            <form id="signupForm" onsubmit="return validateForm();">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  id="username"
                  class="form-control"
                  placeholder="Enter username"
                  onfocus="handleFocus(this)"
                  onfocusout="validateField(this)"
                >
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="text"
                  id="email"
                  class="form-control"
                  placeholder="Enter email"
                  onfocus="handleFocus(this)"
                  onfocusout="validateField(this)"
                >
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Enter password"
                  onfocus="handleFocus(this)"
                  onfocusout="validateField(this)"
                >
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input
                  type="password"
                  id="confirmPassword"
                  class="form-control"
                  placeholder="Confirm password"
                  onfocus="handleFocus(this)"
                  onfocusout="validateField(this)"
                >
              </div>

              <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <div class="text-center mt-3">
              <a href="storefront.html" class="text-decoration-none">Back to Storefront</a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="container text-center mt-4 mb-4">
    <p class="mb-1">
      <a href="#">Terms of Use</a> |
      <a href="#">Cookie &amp; Privacy Policy</a> |
      <a href="#">Copyright</a>
    </p>
    <p class="text-muted mb-0">&copy; 2026 Afnan's Detailing Supplies</p>
  </footer>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Validation JS -->
  <script src="validation.js"></script>
</body>
</html>
